name: Build VCam Overlay

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          brew install ldid xz

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDKs
        run: |
          rm -rf $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1 > build_log.txt 2>&1 || (
            echo "Build failed, pushing log to repo..."
            git config --global user.email "actions@github.com"
            git config --global user.name "GitHub Actions"
            git pull
            git add build_log.txt
            git commit -m "chore: upload failed build log for debugging"
            git push
            exit 2
          )

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vcam-overlay-build
          path: packages/*.deb
          if-no-files-found: error
